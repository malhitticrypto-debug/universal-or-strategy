---
# Codacy Configuration for V12 Universal OR Strategy
# Created: 2026-05-22
# Purpose: Enforce V12 DNA principles (Jane Street alignment, complexity <=15, lock-free patterns)

engines:
  # Enable Roslyn analyzer for C# code quality
  roslyn:
    enabled: true
    
  # Duplication detection (exclude tests and benchmarks)
  duplication:
    enabled: true
    exclude_paths:
      - 'tests/**'
      - 'benchmarks/**'
      - 'sandbox/**'
      # EPIC-ENTRY-CONSOLIDATION: Temporary exclusion for known technical debt
      # These files have legitimate duplications (91+ clones) that will be
      # addressed in a dedicated refactoring epic after REAPER-EXPANSION Phase 2
      # See: docs/brain/EPIC-ENTRY-CONSOLIDATION.md
      - 'src/V12_002.Entries.FFMA.cs'
      - 'src/V12_002.Entries.Retest.cs'
      - 'src/V12_002.Entries.MOMO.cs'
      - 'src/V12_002.Entries.OR.cs'
      - 'src/V12_002.Entries.RMA.cs'
      - 'src/V12_002.Entries.Trend.cs'

# Exclude non-source paths from analysis
exclude_paths:
  - 'docs/**'
  - 'scripts/**'
  - '.github/**'
  - 'conductor/**'
  - 'Traycerrefactor/**'
  - '.bob/**'
  - '.codex/**'
  - '.cursor/**'
  - '.fallow/**'
  - '.idea/**'
  - '.kilocode/**'
  - '.superpowers/**'
  - '.traycer/**'
  - '.vscode/**'
  - '_agents/**'
  - 'AntigravityMobile/**'
  - 'plugins/**'
  - 'scaffolds/**'
  - 'graphify-out/**'

# Complexity threshold (Jane Street alignment: keep functions simple)
# Functions exceeding this threshold will be flagged for refactoring
complexity:
  threshold: 15

# Ignore patterns for legacy files (to be refactored separately)
# These files have known technical debt and are tracked separately
ignore:
  # Legacy drawing helpers (high complexity, scheduled for refactor)
  - 'src/V12_002.DrawingHelpers.cs'
  
  # Legacy ATM module (scheduled for SIMA extraction)
  - 'src/V12_002.Atm.cs'
  
  # Jane Street Deviation #1: Struct-based events (zero-allocation hot path)
  # Reason: Signal broadcast is a hot path (1000+ calls/sec). EventArgs inheritance
  # would cause 1000+ heap allocations/sec = GC pressure during trading.
  # Struct pattern = stack allocation = zero GC impact.
  # Decision: docs/standards/JANE_STREET_DEVIATIONS.md #1
  # Suppressions: CA1003 (EventArgs inheritance)
  - 'src/SignalBroadcaster.cs'

# Made with Bob
