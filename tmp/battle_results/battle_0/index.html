    return typeof av === "string" ? av.localeCompare(bv) * sort.dir : (av - bv) * sort.dir;
  });
  const cols = [

  function toggleSort(col) {
    setSort(s => s.col === col ? { col, dir: s.dir * -1 } : { col, dir: -1 });

function GroupDonut() {
  const groups = Object.entries(GROUP_COLORS).map(([name, c]) => {
    const mods = MODULES.filter(m => m.group === name);
    const loc = mods.reduce((s, m) => s + m.loc, 0);
    return { name, loc, color: c.text, count: mods.length };
  });
  const total = groups.reduce((s, g) => s + g.loc, 0);

  let angle = 0;
  const slices = groups.map(g => {
    const pct = g.loc / total;
    const start = angle;
    angle += pct * 360;
    return { ...g, pct, start, end: angle };
  });

  function polarToXY(deg, r) {
    const rad = (deg - 90) * Math.PI / 180;
    return { x: 50 + r * Math.cos(rad), y: 50 + r * Math.sin(rad) };
  }
  function describeArc(start, end, r) {
    const s = polarToXY(start, r);
    const e = polarToXY(end, r);
    const large = end - start > 180 ? 1 : 0;
    return `M 50 50 L ${s.x} ${s.y} A ${r} ${r} 0 ${large} 1 ${e.x} ${e.y} Z`;
  }

  return (
    <div className="flex items-center gap-6 flex-wrap">
      <svg viewBox="0 0 100 100" className="w-40 h-40 shrink-0" style={{ filter: "drop-shadow(0 0 8px rgba(0,245,255,0.2))" }}>
        {slices.map((s, i) => (
          <path key={i} d={describeArc(s.start, s.end - 0.5, 40)} fill={s.color} opacity="0.82" />
        ))}
        <circle cx="50" cy="50" r="22" fill="#090f1e" />
        <text x="50" y="47" textAnchor="middle" fill="#00f5ff" fontSize="7" fontFamily="JetBrains Mono" fontWeight="700">{MODULES.length}</text>
        <text x="50" y="55" textAnchor="middle" fill="#4a6080" fontSize="5" fontFamily="JetBrains Mono">Modules</text>
      </svg>
      <div className="grid grid-cols-2 gap-x-6 gap-y-1.5">
        {slices.map((s, i) => (
          <div key={i} className="flex items-center gap-2 text-xs mono">
            <span className="w-2.5 h-2.5 rounded-sm shrink-0" style={{ background: s.color }}></span>
            <span className="text-[#6080a0]">{s.name}</span>
            <span style={{ color: s.color }}>{s.count}</span>
          </div>
        ))}
      </div>
    </div>
  );
}
