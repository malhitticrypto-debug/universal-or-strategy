version: 2
updates:
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
    groups:
      all:
        patterns:
          - "*"
    reviewers:
      - "mkalhitti-cloud"
    commit-message:
      prefix: "chore(deps)"
  - package-ecosystem: "nuget"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
    groups:
      all:
        patterns:
          - "*"
    reviewers:
      - "mkalhitti-cloud"
    commit-message:
      prefix: "chore(deps)"
