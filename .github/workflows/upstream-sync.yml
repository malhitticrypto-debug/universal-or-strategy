name: Sync Fork with Upstream Multica

on:
  schedule:
    # Every Monday at 08:00 UTC
    - cron: "0 8 * * 1"
  workflow_dispatch: # Allow manual trigger

jobs:
  sync:
    runs-on: ubuntu-latest
    # Only runs in YOUR fork, not upstream
    if: github.repository == 'mkalhitti-cloud/multica'

    steps:
      - name: Checkout fork
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5  # v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          fetch-depth: 0

      - name: Add upstream remote
        run: |
          git remote add upstream https://github.com/multica-ai/multica.git
          git fetch upstream

      - name: Merge upstream/main -> origin/main
        run: |
          git checkout main
          git merge upstream/main --no-edit --allow-unrelated-histories
          git push origin main
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
