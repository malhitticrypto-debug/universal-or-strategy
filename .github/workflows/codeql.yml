# [BUILD 948] CodeQL Security Analysis
# Scans C# source code for security vulnerabilities and bugs on every Push and PR.
# Free for all repositories. Results appear in the GitHub Security tab.

name: "CodeQL Security Scan"

on:
  push:
    branches: ["main", "build/**"]
  pull_request:
    branches: ["main"]
  schedule:
    # Run every Monday at 08:00 UTC (a weekly "background audit")
    - cron: "0 8 * * 1"

jobs:
  analyze:
    name: Analyze (C#)
    runs-on: windows-latest
    permissions:
      actions: read
      contents: read
      security-events: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Initialize CodeQL
        uses: github/codeql-action/init@v3
        with:
          languages: csharp
          # Only scan strategy source files -- skip generated/vendor files
          config: |
            paths:
              - src/

      - name: Build C# Strategy (MSBuild)
        run: |
          echo "Building NinjaScript strategy source for CodeQL analysis..."
          # CodeQL hooks into the compiler -- a successful build = full analysis
          dotnet build src/ --nologo --verbosity minimal || true

      - name: Perform CodeQL Analysis
        uses: github/codeql-action/analyze@v3
        with:
          category: "/language:csharp"
