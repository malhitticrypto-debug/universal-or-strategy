name: gitleaks

on:
  push:
  pull_request:

permissions:
  contents: read
  security-events: write

jobs:
  gitleaks:
    name: gitleaks
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5

      - name: Install Gitleaks CLI 8.30.1
        run: |
          curl -sSL -o gitleaks.tar.gz https://github.com/gitleaks/gitleaks/releases/download/v8.30.1/gitleaks_8.30.1_linux_x64.tar.gz
          tar -xzf gitleaks.tar.gz gitleaks
          sudo install -m 0755 gitleaks /usr/local/bin/gitleaks
          gitleaks version

      - name: Detect secrets
        run: gitleaks detect --no-git --source . --config .gitleaks.toml --verbose --redact --no-banner

      - name: Generate SARIF
        if: always()
        continue-on-error: true
        run: gitleaks detect --no-git --source . --config .gitleaks.toml --verbose --redact --no-banner --report-format sarif --report-path results.sarif

      - name: Upload SARIF
        if: always() && hashFiles('results.sarif') != ''
        uses: github/codeql-action/upload-sarif@7fc6561ed893d15cec696e062df840b21db27eb0
        with:
          sarif_file: results.sarif
