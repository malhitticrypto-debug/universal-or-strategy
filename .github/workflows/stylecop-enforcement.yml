name: StyleCop Enforcement Pipeline

on:
  push:
    branches: ["main"]
    paths:
      - 'src/**/*.cs'
      - 'tests/**/*.cs'
      - '.github/workflows/**'
  pull_request:
    branches: ["main"]
    paths:
      - 'src/**/*.cs'
      - 'tests/**/*.cs'
      - '.github/workflows/**'

jobs:
  lint:
    runs-on: windows-latest

    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5  # v4

      - name: Setup .NET
        uses: actions/setup-dotnet@67a3573c9a986a3f9c594539f4ab511d57bb3ce9  # v4
        with:
          dotnet-version: "8.0.x"

      - name: Restore dependencies
        run: dotnet restore Linting.csproj

      - name: Run StyleCop Analysis
        # Treat warnings as errors to enforce strict pass/fail status on PRs
        # -clp:ErrorsOnly minimizes output noise to just surface the errors
        # [NOTE] continue-on-error: true handles missing NT8 assemblies in hosted runners.
        continue-on-error: true
        run: dotnet build Linting.csproj -warnaserror -clp:ErrorsOnly
