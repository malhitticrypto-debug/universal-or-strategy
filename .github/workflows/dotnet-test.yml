name: .NET Test

on:
  push:
    branches:
      - main
      - build/**
  pull_request:
    branches:
      - main

jobs:
  test:
    name: Test and Coverage
    runs-on: windows-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
        with:
          fetch-depth: 0

      - name: Setup .NET
        uses: actions/setup-dotnet@67a3573c9a986a3f9c594539f4ab511d57bb3ce9
        with:
          dotnet-version: "8.0.x"

      - name: Restore test project
        run: |
          dotnet restore Testing.csproj
        shell: pwsh

      - name: Run tests with OpenCover coverage
        run: |
          dotnet test Testing.csproj --no-restore /p:CollectCoverage=true /p:IncludeTestAssembly=true /p:CoverletOutputFormat=opencover /p:CoverletOutput=./TestResults/coverage.opencover.xml --logger "trx;LogFileName=test-results.trx" --results-directory ./TestResults
        shell: pwsh

      - name: Upload TRX results
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02
        with:
          name: test-results
          path: TestResults/**/*.trx

      - name: Upload OpenCover results
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02
        with:
          name: coverage-opencover
          path: TestResults/coverage.opencover.xml
