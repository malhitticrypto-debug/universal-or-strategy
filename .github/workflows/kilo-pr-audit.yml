name: Kilo Code PR Auditor (Gemini 3.1 Pro)

on:
  pull_request:
    types: [opened, synchronize, reopened]

jobs:
  kilo-audit:
    name: Kilo 3.1 Pro (Meta-Purge Audit)
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Extract PR diff
        id: diff
        run: |
          git diff origin/${{ github.event.pull_request.base.ref }}...HEAD > pr.diff

      - name: Authenticate to Google Cloud
        id: auth
        uses: google-github-actions/auth@v2
        with:
          credentials_json: "${{ secrets.GCP_CREDENTIALS }}"

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install Vertex AI SDK
        run: npm install @google-cloud/vertexai

      - name: Run Kilo Code Audit
        id: kilo_audit
        env:
          GCP_PROJECT_ID: ${{ secrets.GCP_PROJECT_ID || 'project-263b6139-6893-4788-995' }}
          GCP_REGION: ${{ secrets.GCP_REGION || 'us-central1' }}
        run: |
          cat << 'EOF' > kilo_audit.js
          const fs = require('fs');
          const { VertexAI } = require('@google-cloud/vertexai');

          async function run() {
            try {
              const diffContent = fs.readFileSync('pr.diff', 'utf8');
              let geminiMdContent = '';
              try {
                geminiMdContent = fs.readFileSync('GEMINI.md', 'utf8');
              } catch (e) {
                console.log('GEMINI.md not found, proceeding without it.');
              }

              const prompt = `You are the Kilo Code PR Auditor (Gemini 3.1 Pro) performing an automated forensic audit.
              Your role is a "Senior software engineer conducting thorough code reviews. You focus on code quality, security, performance, and maintainability."

              MISSION BRIEF:
              - Analyze the following PR diff strictly against our project's GEMINI.md standards (Zero-Trust IPC, FSM mutations, etc.).
              - Specifically verify the "Build 973 Meta-Purge Fix" (FSM-Aware Guard in AccountOrders.cs).
              - Ensure the guard intercepts PendingCancel states to safely bypass gfExp == 0 and fall through to let the resubmit path proceed.
              - Verify that Fix-C in Propagation.cs remains reachable and can re-assert the ledger.
              - Strictly enforce ASCII-ONLY string literals in all print messages.
              - Enforce PascalCase for methods and camelCase for local variables.
              - Ensure all state mutations (activePositions, expectedPositions) are guarded by lock(stateLock).

              GEMINI.md context:
              ${geminiMdContent}

              PR DIFF:
              ${diffContent}

              Provide a systematic review of the changes:
              1. Evaluate strict adherence to the standards (e.g., FSM replace pattern vs cancel+submit, lock guards).
              2. Identifying any logic gaps, potential bugs, security issues, or improvement opportunities. 
              3. Final Audit Verdict: PASS or FAIL.
              
              Be thorough, precise, and uncompromising on our institutional safety rules.`;

              const vertex_ai = new VertexAI({project: process.env.GCP_PROJECT_ID, location: process.env.GCP_REGION});
              let generativeModel;
              try {
                generativeModel = vertex_ai.getGenerativeModel({
                  model: 'gemini-3.1-pro-preview',
                });
                // Test call to verify access
                await generativeModel.generateContent({
                  contents: [{role: 'user', parts: [{text: 'ping'}]}],
                });
              } catch (e) {
                if (e.message.includes('404') || e.message.includes('not found')) {
                  console.log('Gemini 3.1 Pro Preview not found, falling back to Gemini 1.5 Pro...');
                  generativeModel = vertex_ai.getGenerativeModel({
                    model: 'gemini-1.5-pro-002',
                  });
                } else {
                  throw e;
                }
              }

              const resp = await generativeModel.generateContent({
                contents: [{role: 'user', parts: [{text: prompt}]}],
              });
              
              const reviewText = resp.response.candidates[0].content.parts[0].text;
              fs.writeFileSync('review.txt', reviewText);
            } catch (error) {
              console.error("Error context:", error);
              fs.writeFileSync('review.txt', "⚠️ **Kilo Auditor Failed to Execute**: " + error.message);
              process.exit(0); // Exit with 0 to allow the next step to post the error message
            }
          }
          run();
          EOF
          node kilo_audit.js

      - name: Post Kilo Review Comment
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const reviewText = fs.readFileSync('review.txt', 'utf8');
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              body: "### 🤖 Kilo Code PR Auditor (Gemini 3.1 Pro via Vertex AI)\n\n" + reviewText
            });
