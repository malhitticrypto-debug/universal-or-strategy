name: Codex Pre-Triage PR Audit

on:
  pull_request:
    types: [opened, synchronize, reopened]
    branches: [main, master]

permissions:
  pull-requests: write
  contents: read

jobs:
  codex-audit:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Extract PR diff
        id: diff
        run: |
          git diff origin/${{ github.event.pull_request.base.ref }}...HEAD > pr.diff

      - name: Run Codex Audit via OpenAI (GPT-4o)
        uses: actions/github-script@v7
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
        with:
          script: |
            const fs = require('fs');
            const diffContent = fs.readFileSync('pr.diff', 'utf8');
            let codexBrain = '';
            try {
              codexBrain = fs.readFileSync('.agent/brain/codex_pr25_audit.md', 'utf8');
            } catch (e) {
              codexBrain = 'No specific mission brief found. Perform a general forensic audit for race conditions and ASCII compliance.';
            }

            const prompt = `You are Codex (GPT-4o), the Volume Laborer and Forensic Auditor.
            Your task is to analyze the following PR diff against our project's forensic standards.

            MISSION BRIEF:
            ${codexBrain}

            PR DIFF:
            ${diffContent}

            Provide a systematic P1/P2/P3 severity report:
            1. P1 (Critical): Race conditions, ghost order risks, or thread-safety violations.
            2. P2 (Warning): ASCII violations, logic gaps, or non-compliant FSM patterns.
            3. P3 (Stylistic): Naming, metabolic elegance, and C# 8.0/NT8 efficiency.
            
            Final Verdict: PASS or FAIL.`;

            try {
              const response = await fetch('https://api.openai.com/v1/chat/completions', {
                method: 'POST',
                headers: {
                  'Content-Type': 'application/json',
                  'Authorization': `Bearer ${process.env.OPENAI_API_KEY}`
                },
                body: JSON.stringify({
                  model: 'gpt-4o',
                  messages: [{ role: 'user', content: prompt }],
                  temperature: 0.1
                })
              });

              if (!response.ok) {
                const errorData = await response.json();
                throw new Error(`OpenAI API error: ${JSON.stringify(errorData)}`);
              }

              const data = await response.json();
              const reviewText = data.choices[0].message.content;

              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.issue.number,
                body: "### 🔍 Codex Forensic Auditor (GPT-4o)\n\n" + reviewText
              });
            } catch (error) {
              console.error("Audit failed:", error);
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.issue.number,
                body: "⚠️ **Codex Auditor Failed to Execute**: " + error.message
              });
            }
