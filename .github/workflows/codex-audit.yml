name: Codex Pre-Triage PR Audit

on:
  pull_request:
    types: [opened, synchronize, reopened]
    branches: [main, master]

permissions:
  pull-requests: write
  contents: read

jobs:
  codex-audit:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install Aider (OpenAI CLI)
        run: pip install aider-chat

      - name: Run Codex Audit via OpenAI
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
        run: |
          # Use Aider in headless mode to execute the audit using GPT-4o
          aider --model gpt-4o --no-auto-commits --yes-always --message "Execute audit mission: .agent/brain/codex_pr25_audit.md. Read the workflows and write the final P1/P2/P3 severity report safely to audit_output.md without modifying any source files." > audit_output.md

      - name: Post Audit Results to PR
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          if [ -f audit_output.md ]; then
            gh pr comment ${{ github.event.pull_request.number }} --body-file audit_output.md
          else
            echo "Audit output file not found."
            # Fallback if Aider stdout'd it instead
            gh pr comment ${{ github.event.pull_request.number }} --body "The OpenAI audit finished, but the markdown file was not saved correctly. Please check action logs."
          fi
